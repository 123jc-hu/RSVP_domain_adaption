# DSAN-CCL baseline on THU RSVP with the paper's own backbone and
# CE(source) + LMMD + CCL objective.
#
# Assumptions from the provided paper text:
# - temporal conv kernel = 13
# - avg-pool kernel = 35, stride = 7
# - projection dim = 1024
# - classifier hidden dim = 512
# - temporal filter count `n` is not shown in the copied text, so start from 64
# - lambda values are exposed; start from 0.1 / 0.1 as a first baseline

model: DSANCCL
dataset: THU

overrides:
  is_training: true
  exp_tag: dsan_ccl_all_sub1_20

  source_selection: All
  all_source_batch_policy: random_k
  all_source_sampling_mode: uniform

  held_out_start_id: 1
  held_out_end_id: 20

  subject_batch_size: 64
  subjects_per_batch: 32

  learning_rate: 0.001
  random_seed: 2026
  epochs: 400
  early_stop_start_epoch: 30
  patience: 10

  use_target_stream: true
  lambda_align: 0.1
  alignment_loss: lmmd
  lambda_ccl: 0.1
  ccl_start_epoch: 0

  dsan_num_filters: 64
  dsan_temporal_kernel: 13
  dsan_pool_kernel: 35
  dsan_pool_stride: 7
  dsan_feature_dim: 1024
  dsan_classifier_hidden_dim: 512
  dsan_dropout: 0.5

  lmmd_use_soft_target: true
  lmmd_kernel_mul: 2.0
  lmmd_kernel_num: 5
  lmmd_fix_sigma: null

  val_batch_size: 1024
  minimal_log: true
  debug_domain_batch: false
  log_runtime: false

  deterministic_run: true
  cudnn_benchmark: false
  matmul_precision: highest
