# EEGNetDualHead + EA + global MMD on flat branch | quick sanity on held-out sub1~2

model: EEGNetDualHead
dataset: THU

overrides:
  is_training: true
  exp_tag: eegnetdual_ea_globalmmd_sub1_2_k32_bgds4_quick

  source_selection: All
  all_source_batch_policy: random_k
  all_source_sampling_mode: uniform

  held_out_start_id: 1
  held_out_end_id: 2

  subject_batch_size: 64
  subjects_per_batch: 32

  learning_rate: 0.001
  random_seed: 2026
  epochs: 400
  early_stop_start_epoch: 30
  patience: 10

  ea_enable: true
  ea_cov_eps: 1.0e-6

  source_train_bg_downsample_enable: true
  source_train_bg_downsample_bg_to_pos_ratio: 4.0
  source_train_bg_downsample_seed: 2026

  use_target_stream: true
  lambda_align: 0.1
  alignment_loss: global_mmd

  val_batch_size: 1024
  minimal_log: true
  debug_domain_batch: false
  log_runtime: false

  deterministic_run: true
  cudnn_benchmark: false
  matmul_precision: highest

  eegnet_dual_fusion_flat_weight: 0.7
  eegnet_dual_lambda_flat_ce: 0.5
  eegnet_dual_lambda_ts_ce: 0.5
  eegnet_ts_cov_eps: 1.0e-4
  eegnet_ts_cov_shrinkage_alpha: 0.0
  eegnet_ts_head_channels: 16
