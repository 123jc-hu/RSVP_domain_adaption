# EEGNetSWLDSA + EA + global MMD (similarity-weighted source prior), sub1~10 quick

model: EEGNetSWLDSA
dataset: THU

overrides:
  is_training: true
  exp_tag: eegnetswldsa_all_sub1_10_k32_bgds4_ea_globalmmd

  source_selection: All
  all_source_batch_policy: random_k
  all_source_sampling_mode: uniform

  held_out_start_id: 1
  held_out_end_id: 10

  subject_batch_size: 64
  subjects_per_batch: 32

  learning_rate: 0.001
  random_seed: 2026
  epochs: 400
  early_stop_start_epoch: 30
  patience: 10

  ea_enable: true
  ea_cov_eps: 1.0e-6

  source_train_bg_downsample_enable: true
  source_train_bg_downsample_bg_to_pos_ratio: 4.0
  source_train_bg_downsample_seed: 2026

  use_target_stream: true
  lambda_align: 0.1
  alignment_loss: global_mmd

  swldsa_target_blend_alpha: 0.1
  swldsa_similarity_tau: 1.0
  swldsa_var_distance_weight: 1.0

  val_batch_size: 1024
  minimal_log: true
  debug_domain_batch: false
  log_runtime: false

  deterministic_run: true
  cudnn_benchmark: false
  matmul_precision: highest
