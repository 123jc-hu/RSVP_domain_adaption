model: EEGInception
dataset: THU
train_mode: cross-subject
is_training: true
use_gpu: true
random_seed: 2026
n_fold: null
deterministic_run: true
cudnn_benchmark: false
matmul_precision: highest  # highest | high | medium
dataset_root: /home/cdd/datasets/learning_projects/few-shot-learning_RSVP/Dataset

# Training schedule & optimization
epochs: 400
val_batch_size: 1024  # Larger validation batch for faster val pass
weight_decay: 0.0001
patience: 15
early_stop_start_epoch: 30
cosine_eta_min_factor: 0.01
class_weighted_ce: true

# Optional subject-wise Euclidean Alignment preprocessing
ea_enable: false
ea_cov_eps: 1.0e-6

# Optional source-train background downsampling
# Applied only to source train split after train/val split; val/test untouched.
source_train_bg_downsample_enable: false
source_train_bg_downsample_bg_to_pos_ratio: 4.0
source_train_bg_downsample_seed: 2026
source_train_bg_downsample_positive_label: 1
source_train_bg_downsample_background_label: 0

# Runtime profiling
log_runtime: true
rt_deadline_ms: 200.0
minimal_log: true   # true: keep logs compact (start settings + per-subject test + dataset average)
debug_domain_batch: false  # true: print domain composition for the first few training steps
debug_domain_batch_max_steps: 3

# Source selection policy
source_selection: All      # Options: All | Random | R-PCS | SimilarityOnly | DiscrimOnly (PCCS alias)
source_selection_k: null
source_selection_min_score: null

# Subject-wise training batch policy (fair K-subject comparison)
# global_train_batch = subjects_per_batch * subject_batch_size
subject_batch_size: 64      # b: samples per selected subject in one training step
subjects_per_batch: 16      # K: number of source subjects sampled per training step
all_source_batch_policy: random_k  # All-Source mode: random_k (random K each step) | fixed_k
all_source_sampling_mode: uniform  # uniform | score_weighted
all_source_sampling_mix_alpha: 0.2

# Dynamic feature-space sampling (All-source only)
dynamic_feature_sampling_enable: false
dynamic_feature_sampling_warmup_epochs: 10
dynamic_feature_sampling_refresh_every: 10
dynamic_feature_sampling_source_support_size: 128
dynamic_feature_sampling_target_support_size: 128
dynamic_feature_sampling_seed: 2026
dynamic_feature_sampling_metric: mmd    # mmd | mean_cosine | mean_euclidean | soft_class_mmd
dynamic_feature_sampling_temperature: 1.0
dynamic_feature_sampling_mix_alpha: 0.2
dynamic_feature_sampling_l2_normalize: true
dynamic_feature_sampling_score_eps: 1.0e-6
dynamic_feature_sampling_mmd_sigma: 1.0
dynamic_feature_sampling_batch_size: 256
dynamic_feature_sampling_pos_weight: 0.7
dynamic_feature_sampling_use_confidence_weight: true
dynamic_feature_sampling_min_class_samples: 8
dynamic_feature_sampling_score_ema_enable: false
dynamic_feature_sampling_score_ema_decay: 0.8

# DSAN-CCL / LMMD controls
lmmd_use_soft_target: true
lmmd_kernel_mul: 2.0
lmmd_kernel_num: 5
lmmd_fix_sigma: null

# DSAN-CCL backbone controls
dsan_num_filters: 64
dsan_temporal_kernel: 13
dsan_pool_kernel: 35
dsan_pool_stride: 7
dsan_feature_dim: 1024
dsan_classifier_hidden_dim: 512
dsan_dropout: 0.5

# DA framework switches (scaffold stage)
use_target_stream: false
embedding_space: Euclidean  # Options: Hyperbolic | Euclidean
psi_method: None            # Options: Tangent_Space | Time_Domain | None
training_mode: End2End      # Options: Decoupled | End2End
lambda_align: 0.0
alignment_loss: mmd         # supports: mmd, lmmd, global_mmd, per_subject_mmd, global_coral, per_subject_coral
lambda_class_align: 0.0
class_align_start_epoch: 30
class_align_conf_thresh: 0.8
class_align_min_conf_samples: 8
class_align_use_soft_weights: true
lambda_ccl: 0.0
ccl_start_epoch: 0
lambda_prior: 0.0
prior_start_epoch: 30
prior_min: 0.03
prior_max: 0.09
prior_loss_type: l2
logit_adjustment: false
pseudo_refinement: false

# DataLoader I/O tuning (especially useful when dataset is on NTFS mount)
num_workers: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 2

# IAHM controls (imbalance-aware hyperbolic metric loss)
iahm_enable: false
iahm_curvature: -1.0
iahm_r0: 1.0
iahm_gamma: 1.0
iahm_m0: 1.0
iahm_margin_alpha: 0.25
iahm_lambda_r: 1.0
iahm_lambda_c: 0.5
iahm_lambda_m: 1.0
iahm_lambda_total: 1.0
iahm_centroid_momentum: 0.1

# RPT-Aug controls (parallel-transport target-positive synthesis)
rpt_aug_enable: false
rpt_aug_beta: 1.0
rpt_aug_default_n_synth: 100
rpt_aug_n_synth_per_batch: null
rpt_aug_inject_to_ce: true
rpt_aug_score_mode: uniform        # uniform | selection_scores
rpt_aug_weighted_sampling: true
rpt_aug_clip_factor: 3.0
rpt_aug_cov_eps: 1.0e-6
rpt_aug_cov_estimator: sample      # sample | oas | lw
rpt_aug_cov_shrinkage: 0.0
rpt_aug_use_correlation: true
rpt_aug_correlation_eps: 1.0e-12
rpt_aug_input_layout: channel_first # channel_first | time_first | auto

# R-PCS controls (preferred) + PCCS legacy aliases
rpcs_positive_label: 1
rpcs_background_label: 0
rpcs_max_trials_per_class: 128
rpcs_min_trials_per_class: 4
rpcs_top_k: null             # null 时默认回退为 subjects_per_batch
rpcs_mean_metric: riemann
rpcs_distance_metric: riemann
rpcs_mean_max_iter: 20
rpcs_mean_tol: 1.0e-6
rpcs_cov_eps: 1.0e-6
rpcs_cov_shrinkage: 0.0
rpcs_cov_estimator: sample      # sample | oas | lw
rpcs_use_correlation: true
rpcs_correlation_eps: 1.0e-12
rpcs_input_layout: channel_first # channel_first | time_first | auto
rpcs_plot_top_k: 10
rpcs_score_mode: rpcs
rpcs_score_eps: 1.0e-6
rpcs_target_use_all_trials: true
rpcs_target_max_trials: null
rpcs_target_bg_mode: amplitude  # amplitude | amplitude_restricted | kurtosis | all
rpcs_target_bg_ratio: 0.7
rpcs_target_bg_channel_indices: []  # used by amplitude_restricted mode
rpcs_tau_d: null
rpcs_tau_s: null
rpcs_tau_d_percentile: 30.0
rpcs_tau_s_percentile: 70.0

# PCCS scaffold controls (legacy compatibility)
pccs_positive_label: 1
pccs_background_label: 0
pccs_max_trials_per_class: 128
pccs_min_trials_per_class: 4
pccs_top_k: null
pccs_mean_metric: riemann
pccs_distance_metric: riemann
pccs_mean_max_iter: 20
pccs_mean_tol: 1.0e-6
pccs_cov_eps: 1.0e-6
pccs_cov_shrinkage: 0.0
pccs_cov_estimator: sample
pccs_use_correlation: true
pccs_correlation_eps: 1.0e-12
pccs_input_layout: channel_first
pccs_plot_top_k: 10
pccs_score_mode: rpcs          # rpcs | similarity_only | discrim_only (used when source_selection=R-PCS/PCCS)
pccs_score_eps: 1.0e-6
pccs_target_use_all_trials: true
pccs_target_max_trials: null
pccs_target_bg_mode: amplitude
pccs_target_bg_ratio: 0.7
pccs_target_bg_channel_indices: []
pccs_tau_d: null
pccs_tau_s: null
pccs_tau_d_percentile: 30.0
pccs_tau_s_percentile: 70.0

datasets:
  THU:
    sub_num: 64
    n_channels: 62
    fs: 128
    n_class: 2
  CAS:
    sub_num: 14
    n_channels: 62
    fs: 128
    n_class: 2
  GIST:
    sub_num: 55
    n_channels: 32
    fs: 128
    n_class: 2
  TCTR_1:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2
  TCTR_2:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2
  TCTR_A:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2
  TCTR_B:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2

