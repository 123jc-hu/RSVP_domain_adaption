  DeepConvNet:
    learning_rate: 0.00005
    cosine_t_max: 150

  EEGNet:
    learning_rate: 0.001
    cosine_t_max: 150

  PLNet:
    learning_rate: 0.001
    cosine_t_max: 150

  EEGInception:
    learning_rate: 0.0001
    cosine_t_max: 150

  EEGConformer:
    learning_rate: 0.00005
    cosine_t_max: 150

  EEGIncNet:
    learning_rate: 0.001
    cosine_t_max: 150

  PPNN:
    learning_rate: 0.0001
    cosine_t_max: 150
