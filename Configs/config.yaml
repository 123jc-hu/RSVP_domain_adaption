    n_channels: 62
    fs: 128
    n_class: 2
  GIST:
    sub_num: 55
    n_channels: 32
    fs: 128
    n_class: 2
  TCTR_1:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2
  TCTR_2:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2
  TCTR_A:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2
  TCTR_B:
    sub_num: 15
    n_channels: 64
    fs: 128
    n_class: 2

