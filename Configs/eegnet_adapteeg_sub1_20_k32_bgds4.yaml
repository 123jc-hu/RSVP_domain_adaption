# EEGNet backbone + AdaptEEG-style DA objective on the project's stable source-training recipe
# = CE(source) + LMMD(source,target) + CCL(target pseudo-labels)
#
# Why this variant exists:
# - the THU source pool is extremely imbalanced without source-side control
# - for fair DA-method comparison under a fixed backbone, keep the source-training recipe stable
# - only replace the DA objective, do not let the baseline collapse first
#
# Run:
#   cd /home/cdd/RSVP/domain_adaption
#   /home/cdd/miniconda3/envs/rsvp_pl/bin/python run_model_config.py --config Configs/eegnet_adapteeg_sub1_20_k32_bgds4.yaml

model: EEGNet
dataset: THU

overrides:
  is_training: true
  exp_tag: eegnet_adapteeg_sub1_20_k32_bgds4

  source_selection: All
  all_source_batch_policy: random_k
  all_source_sampling_mode: uniform

  held_out_start_id: 1
  held_out_end_id: 20

  subject_batch_size: 64
  subjects_per_batch: 32

  learning_rate: 0.001
  random_seed: 2026
  epochs: 400
  early_stop_start_epoch: 30
  patience: 10

  class_weighted_ce: true

  source_train_bg_downsample_enable: true
  source_train_bg_downsample_bg_to_pos_ratio: 4.0
  source_train_bg_downsample_seed: 2026

  use_target_stream: true
  lambda_align: 0.1
  alignment_loss: lmmd
  lambda_ccl: 0.1
  ccl_start_epoch: 0

  lmmd_use_soft_target: true
  lmmd_kernel_mul: 2.0
  lmmd_kernel_num: 5
  lmmd_fix_sigma: null

  val_batch_size: 1024
  minimal_log: true
  debug_domain_batch: false
  log_runtime: false

  deterministic_run: true
  cudnn_benchmark: false
  matmul_precision: highest
