# EEGInception + random_k_fixed_pool 配置
# 用途：前 20 个 subject 依次作为 held-out target，使用随机固定 K 个 source subject 训练。
#
# 运行方式：
#   cd /home/cdd/RSVP/domain_adaption
#   /home/cdd/miniconda3/envs/rsvp_pl/bin/python run_model_config.py --config Configs/eeginception_random_k_fixed_pool_sub1_20.yaml

model: EEGInception
dataset: THU

overrides:
  is_training: true

  source_selection: Random

  held_out_start_id: 1
  held_out_end_id: 20

  subject_batch_size: 64
  subjects_per_batch: 16

  random_seed: 2026
  epochs: 400
  early_stop_start_epoch: 30
  patience: 15

  val_batch_size: 1024
  minimal_log: true
  debug_domain_batch: false
  log_runtime: false

  deterministic_run: true
  cudnn_benchmark: false
  matmul_precision: highest
